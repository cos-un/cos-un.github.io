<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS-352 Örnek Sitesi</title>
    <style>
        /* Temel Renkler ve Font Ayarları */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #d32f2f; /* Tasarıma enerji katan kırmızı bir ton */
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Başlık (Header) Alanı */
        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 4rem 2rem;
            border-bottom: 5px solid var(--secondary-color);
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.9;
        }

        /* İçerik Konteyneri */
        .container {
            max-width: 900px;
            margin: -2rem auto 2rem auto; /* Üst kısımla hafif iç içe geçme efekti */
            padding: 0 2rem;
        }

        /* Bölümler (Kart Görünümü) */
        .section {
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .section h2 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
        }

        .section h2::after {
            content: "";
            flex: 1;
            height: 2px;
            background: #eee;
            margin-left: 15px;
        }

        /* İlgi Alanları Izgarası */
        .hobbies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-color);
            padding: 1.5rem;
            border-radius: 6px;
            border-left: 4px solid var(--secondary-color);
        }
