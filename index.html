<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS 352 Örnek Sitesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Görseldeki mor tona yakın bir arka plan rengi */
            background-color: #000000; 
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .content {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: normal;
            margin-bottom: 25px;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Butonların yan yana durması için container */
        .links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* Buton tasarımları */
        .link-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            background-color: transparent;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .link-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.8);
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>ADS 352</h1>
        <h2>Açık Kaynak Yazılım Geliştirme Dersi</h2>
        
        <p>Merhaba! Ben <strong>Mehmet COŞĞUN</strong>. Bu site ADS 352 Açık Kaynak Yazılım Geliştirme dersi için oluşturulmuştur.</p>
        
        <div class="links">
            <a href="mailto:ornek@email.com" class="link-btn"><i class="fa-regular fa-envelope"></i> E-posta</a>
            <a href="#" class="link-btn"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
            <a href="#" class="link-btn"><i class="fa-brands fa-github"></i> GitHub</a>
            <a href="#" class="link-btn"><i class="fa-brands fa-instagram"></i> Instagram</a>
        </div>
    </div>

    <footer>
        &copy; 2026 ADS-352. Tüm hakları saklıdır.
    </footer>

</body>
</html>
